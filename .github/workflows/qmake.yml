name: build with qmake on windows
on:
#  push:
#    branches: [ main ]
#    paths-ignore:
#      - '.github/workflows/deploy-pages.yml'
#      - 'README.md'
#      - 'manual/**'
  workflow_dispatch:

jobs:
  build-libsndfile:
    runs-on: windows-latest
    if: always() && !cancelled() && !failure()
    steps:
      - name: Clone libogg
        run: git clone --depth=1 https://github.com/xiph/ogg.git libogg-src

      - name: Build libogg
        shell: pwsh
        run: |
          cmake -S libogg-src -B libogg-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/libsndfile" `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TESTING=OFF
          cmake --build libogg-build --config Release --parallel
          cmake --install libogg-build --config Release

      - name: Clone libvorbis
        run: git clone --depth=1 https://github.com/xiph/vorbis.git libvorbis-src

      - name: Build libvorbis
        shell: pwsh
        run: |
          cmake -S libvorbis-src -B libvorbis-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/libsndfile" `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/libsndfile" `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TESTING=OFF
          cmake --build libvorbis-build --config Release --parallel
          cmake --install libvorbis-build --config Release

      - name: Clone libflac
        run: git clone --depth=1 https://github.com/xiph/flac.git libflac-src

      - name: Build libflac
        shell: pwsh
        run: |
          cmake -S libflac-src -B libflac-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/libsndfile" `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/libsndfile" `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_PROGRAMS=OFF `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_TESTING=OFF `
            -DBUILD_DOCS=OFF `
            -DINSTALL_MANPAGES=OFF `
            -DBUILD_CXXLIBS=OFF
          cmake --build libflac-build --config Release --parallel
          cmake --install libflac-build --config Release

      - name: Clone libopus
        run: git clone --depth=1 https://github.com/xiph/opus.git libopus-src

      - name: Build libopus
        shell: pwsh
        run: |
          cmake -S libopus-src -B libopus-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/libsndfile" `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=OFF `
            -DOPUS_BUILD_TESTING=OFF `
            -DOPUS_BUILD_PROGRAMS=OFF
          cmake --build libopus-build --config Release --parallel
          cmake --install libopus-build --config Release

      - name: Clone libsndfile
        run: git clone --depth=1 https://github.com/libsndfile/libsndfile.git libsndfile-src

      - name: Cache libsndfile install
        id: cache-sndfile
        uses: actions/cache@v5
        with:
          path: libsndfile
          key: libsndfile-static-${{ hashFiles('libsndfile-src/**') }}

      - name: Build libsndfile
        if: steps.cache-sndfile.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -S libsndfile-src -B libsndfile-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/libsndfile" `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=ON `
            -DBUILD_PROGRAMS=OFF `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_TESTING=OFF `
            -DENABLE_EXTERNAL_LIBS=ON `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/libsndfile" `
            -DCMAKE_C_FLAGS="-DFLAC__NO_DLL" `
            -DENABLE_MPEG=OFF `
            -DENABLE_CPACK=OFF `
            -DINSTALL_MANPAGES=OFF `
            -DINSTALL_PKGCONFIG_MODULE=OFF
          cmake --build libsndfile-build --config Release --parallel
          cmake --install libsndfile-build --config Release

      - name: Upload libsndfile artifact
        uses: actions/upload-artifact@v7
        with:
          name: libsndfile-static-win64
          path: libsndfile/
          retention-days: 7

  build-portaudio:
    runs-on: windows-latest
    if: always() && !cancelled() && !failure()
    steps:
      - name: Clone PortAudio
        run: git clone --depth=1 https://github.com/PortAudio/portaudio.git portaudio-src

      - name: Cache PortAudio install
        id: cache-pa
        uses: actions/cache@v5
        with:
          path: portaudio
          key: portaudio-shared-${{ hashFiles('portaudio-src/**') }}

      - name: Build PortAudio
        if: steps.cache-pa.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -S portaudio-src -B portaudio-build `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/portaudio" `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=OFF `
            -DPA_USE_WDMKS=ON `
            -DPA_USE_DS=ON `
            -DPA_USE_WASAPI=ON `
            -DPA_USE_WMME=ON `
            -DPA_USE_ASIO=OFF `
            -DPA_USE_ALSA=OFF `
            -DPA_USE_JACK=OFF
          cmake --build portaudio-build --config Release --parallel
          cmake --install portaudio-build --config Release

      - name: Upload PortAudio artifact
        uses: actions/upload-artifact@v7
        with:
          name: portaudio-win64-static
          path: portaudio/
          retention-days: 7

  build-fluidsynth:
    runs-on: windows-latest
    needs: [build-libsndfile, build-portaudio]
    if: always() && !cancelled() && !failure()
    steps:
      - name: Clone FluidSynth branch
        run: |
          git clone --depth=1 --branch multi-reverb-support https://github.com/FluidSynth/fluidsynth.git fluidsynth-src
          cd fluidsynth-src
          git submodule update --init --depth=1 gcem
          git submodule update --init --depth=1 signalsmith-audio-basics
          Remove-Item -Path cmake_admin/FindPortAudio.cmake -ErrorAction SilentlyContinue
          dir gcem
          dir signalsmith-audio-basics

      - name: Download libsndfile
        uses: actions/download-artifact@v8
        with:
          name: libsndfile-static-win64
          path: libsndfile

      - name: Download PortAudio
        uses: actions/download-artifact@v8
        with:
          name: portaudio-win64-static
          path: portaudio

      - name: Cache FluidSynth install
        id: cache-fs
        uses: actions/cache@v5
        with:
          path: fluidsynth
          key: fluidsynth-multi-reverb-sndfile-pa-static-${{ hashFiles('fluidsynth-src/**') }}-${{ hashFiles('libsndfile/**') }}-${{ hashFiles('portaudio/**') }}

      - name: Build FluidSynth
        if: steps.cache-fs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $sndfile = "${{ github.workspace }}/libsndfile"
          $pa = "${{ github.workspace }}/portaudio"
          $env:PATH = "$sndfile/bin;" + $env:PATH
          mkdir -Force "${{ github.workspace }}/fluidsynth/bin"
          cp "$sndfile/bin/*.dll" "${{ github.workspace }}/fluidsynth/bin/"
          cmake -S fluidsynth-src -B fluidsynth-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/fluidsynth" `
            -DCMAKE_PREFIX_PATH="$sndfile;$pa" `
            -Dosal=cpp11 `
            -Denable-portaudio=ON `
            -Denable-alsa=OFF `
            -Denable-jack=OFF `
            -Denable-pulseaudio=OFF `
            -Denable-pipewire=OFF `
            -Denable-dbus=OFF `
            -Denable-oss=OFF `
            -Denable-oboe=OFF `
            -Denable-opensles=OFF `
            -Denable-libinstpatch=OFF `
            -DBUILD_SHARED_LIBS=ON `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_INSTALL_SYSTEM_RUNTIME_LIBS_SKIP=TRUE `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build fluidsynth-build --config Release --parallel
          cmake --install fluidsynth-build --config Release

      - name: Upload FluidSynth artifact
        uses: actions/upload-artifact@v7
        with:
          name: fluidsynth-multi-reverb-win64
          path: fluidsynth/
          retention-days: 7

  build-midieditor:
    runs-on: windows-latest
    needs: build-fluidsynth
    if: always() && !cancelled() && !failure()
    env:
      MIDIEDITOR_RELEASE_VERSION_STRING: "\"continuous integration triggered by ${{ github.sha }}\""
      MIDIEDITOR_RELEASE_DATE: ""
    strategy:
      matrix:
        include:
          - qt_ver: 6.11.*
            qt_arch: win64_msvc2022_64
            msvc_arch: x64
            qt_arch_install: msvc2022_64
    steps:
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_ver }}
          arch: ${{ matrix.qt_arch }}
          host: 'windows'
          target: 'desktop'
          cache: 'false'
          archives: 'qtbase qtopengl qtconcurrent'
          aqtsource: 'git+https://github.com/miurahr/aqtinstall.git'

      - name: Setup MSYS2 and Install QtIFW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-qt-installer-framework

      - name: Setup QtIFW Path from MSYS2
        shell: msys2 {0}
        run: |
          if [ -f "/mingw64/bin/binarycreator.exe" ]; then
            QTIFW_UNIX_PATH="/mingw64/bin"
            QTIFW_WIN_PATH=$(cygpath -w "$QTIFW_UNIX_PATH")
            echo "QTIFW_PATH=$QTIFW_WIN_PATH" >> $GITHUB_ENV
            echo "QTIFW_UNIX_PATH=$QTIFW_UNIX_PATH" >> $GITHUB_ENV
            "$QTIFW_UNIX_PATH/binarycreator.exe" --help > /dev/null 2>&1 && echo "✓ binarycreator.exe is working"
          else
            echo "ERROR: QtIFW tools not found!"
            exit 1
          fi

      - name: Clear MSYS2 Environment for Build
        shell: pwsh
        run: |
          echo "MSYSTEM=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: true

      - name: Download FluidSynth
        uses: actions/download-artifact@v8
        with:
          name: fluidsynth-multi-reverb-win64
          path: fluidsynth

      - name: MSVC Build
        id: build
        shell: cmd
        run: |
          set MIDIEDITOR_RELEASE_DATE="%DATE%"
          set FLUIDSYNTH_DIR=${{ github.workspace }}\fluidsynth
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" ${{ matrix.msvc_arch }}
          qmake CONFIG+=release
          nmake

      - name: Copy Files
        shell: pwsh
        run: |
          $data = "./packaging/org.midieditor.midieditor/data"
          mkdir $data
          cp ./bin/MidiEditor.exe $data/
          windeployqt --release --no-translations --no-opengl-sw --no-system-d3d-compiler --no-compiler-runtime --skip-plugin-types qmltooling,sqldrivers,positioning,sensors,serialport,texttospeech,webengine --plugindir $data/plugins $data/MidiEditor.exe
          Remove-Item -Path ./fluidsynth/bin/vcruntime*.dll -ErrorAction SilentlyContinue
          Remove-Item -Path ./fluidsynth/bin/msvcp*.dll -ErrorAction SilentlyContinue
          Remove-Item -Path ./fluidsynth/bin/concrt*.dll -ErrorAction SilentlyContinue
          cp ./fluidsynth/bin/*.dll $data/
          mkdir ./packaging/org.midieditor.manual/data/
          cp -Recurse -Path ./manual/ -Destination ./packaging/org.midieditor.manual/data/

      - name: Packaging
        shell: pwsh
        run: |
          $binaryCreator = "$env:QTIFW_PATH\binarycreator.exe"
          & $binaryCreator --offline-only -c .\scripts\packaging\windows\config.xml -p .\packaging Install.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: midieditor-qmake-${{ matrix.qt_arch }}
          path: Install.exe
