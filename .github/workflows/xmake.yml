name: build with xmake on windows
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/deploy-pages.yml'
      - 'README.md'
      - 'manual/**'

jobs:
  build-libsndfile:
    runs-on: windows-latest
    if: always() && !cancelled() && !failure()
    steps:
      - name: Clone libogg
        run: git clone --depth=1 https://github.com/xiph/ogg.git libogg-src

      - name: Build libogg
        shell: pwsh
        run: |
          cmake -S libogg-src -B libogg-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/libsndfile" `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TESTING=OFF
          cmake --build libogg-build --config Release --parallel
          cmake --install libogg-build --config Release

      - name: Clone libvorbis
        run: git clone --depth=1 https://github.com/xiph/vorbis.git libvorbis-src

      - name: Build libvorbis
        shell: pwsh
        run: |
          cmake -S libvorbis-src -B libvorbis-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/libsndfile" `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/libsndfile" `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_TESTING=OFF
          cmake --build libvorbis-build --config Release --parallel
          cmake --install libvorbis-build --config Release

      - name: Clone libflac
        run: git clone --depth=1 https://github.com/xiph/flac.git libflac-src

      - name: Build libflac
        shell: pwsh
        run: |
          cmake -S libflac-src -B libflac-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/libsndfile" `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/libsndfile" `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=OFF `
            -DBUILD_PROGRAMS=OFF `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_TESTING=OFF `
            -DBUILD_DOCS=OFF `
            -DINSTALL_MANPAGES=OFF `
            -DBUILD_CXXLIBS=OFF
          cmake --build libflac-build --config Release --parallel
          cmake --install libflac-build --config Release

      - name: Clone libopus
        run: git clone --depth=1 https://github.com/xiph/opus.git libopus-src

      - name: Build libopus
        shell: pwsh
        run: |
          cmake -S libopus-src -B libopus-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/libsndfile" `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=OFF `
            -DOPUS_BUILD_TESTING=OFF `
            -DOPUS_BUILD_PROGRAMS=OFF
          cmake --build libopus-build --config Release --parallel
          cmake --install libopus-build --config Release

      - name: Clone libsndfile
        run: git clone --depth=1 https://github.com/libsndfile/libsndfile.git libsndfile-src

      - name: Cache libsndfile install
        id: cache-sndfile
        uses: actions/cache@v5
        with:
          path: libsndfile
          key: libsndfile-static-${{ hashFiles('libsndfile-src/**') }}

      - name: Build libsndfile
        if: steps.cache-sndfile.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          cmake -S libsndfile-src -B libsndfile-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/libsndfile" `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DBUILD_SHARED_LIBS=ON `
            -DBUILD_PROGRAMS=OFF `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_TESTING=OFF `
            -DENABLE_EXTERNAL_LIBS=ON `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/libsndfile" `
            -DCMAKE_C_FLAGS="-DFLAC__NO_DLL" `
            -DENABLE_MPEG=OFF `
            -DENABLE_CPACK=OFF `
            -DINSTALL_MANPAGES=OFF `
            -DINSTALL_PKGCONFIG_MODULE=OFF
          cmake --build libsndfile-build --config Release --parallel
          cmake --install libsndfile-build --config Release

      - name: Upload libsndfile artifact
        uses: actions/upload-artifact@v7
        with:
          name: libsndfile-static-win64
          path: libsndfile/
          retention-days: 7

  build-fluidsynth:
    runs-on: windows-latest
    needs: [build-libsndfile]
    if: always() && !cancelled() && !failure()
    steps:
      - name: Clone FluidSynth branch
        run: |
          git clone --depth=1 --branch multi-reverb-support https://github.com/FluidSynth/fluidsynth.git fluidsynth-src
          cd fluidsynth-src
          git submodule update --init --depth=1 gcem
          git submodule update --init --depth=1 signalsmith-audio-basics
          dir gcem
          dir signalsmith-audio-basics

      - name: Download libsndfile
        uses: actions/download-artifact@v8
        with:
          name: libsndfile-static-win64
          path: libsndfile

      - name: Cache FluidSynth install
        id: cache-fs
        uses: actions/cache@v5
        with:
          path: fluidsynth
          key: fluidsynth-multi-reverb-sndfile-${{ hashFiles('fluidsynth-src/**') }}-${{ hashFiles('libsndfile/**') }}

      - name: Build FluidSynth
        if: steps.cache-fs.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $sndfile = "${{ github.workspace }}/libsndfile"
          $env:PATH = "$sndfile/bin;" + $env:PATH
          mkdir -Force "${{ github.workspace }}/fluidsynth/bin"
          cp "$sndfile/bin/*.dll" "${{ github.workspace }}/fluidsynth/bin/"
          cmake -S fluidsynth-src -B fluidsynth-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/fluidsynth" `
            -DCMAKE_PREFIX_PATH="$sndfile" `
            -Dosal=cpp11 `
            -Denable-portaudio=OFF `
            -Denable-alsa=OFF `
            -Denable-jack=OFF `
            -Denable-pulseaudio=OFF `
            -Denable-pipewire=OFF `
            -Denable-dbus=OFF `
            -Denable-oss=OFF `
            -Denable-oboe=OFF `
            -Denable-opensles=OFF `
            -Denable-libinstpatch=OFF `
            -DBUILD_SHARED_LIBS=ON `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DCMAKE_INSTALL_SYSTEM_RUNTIME_LIBS_SKIP=TRUE `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build fluidsynth-build --config Release --parallel
          cmake --install fluidsynth-build --config Release

      - name: Upload FluidSynth artifact
        uses: actions/upload-artifact@v7
        with:
          name: fluidsynth-multi-reverb-win64
          path: fluidsynth/
          retention-days: 7

  build-midieditor:
    runs-on: windows-latest
    needs: build-fluidsynth
    if: always() && !cancelled() && !failure()
    strategy:
      matrix:
        include:
          - qt_ver: 6.11.*
            qt_arch: win64_msvc2022_64
            msvc_arch: x64
            qt_arch_install: msvc2022_64
    steps:
      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt_ver }}
          arch: ${{ matrix.qt_arch }}
          host: 'windows'
          target: 'desktop'
          cache: 'false'
          archives: 'qtbase qtopengl qtconcurrent'
          aqtsource: 'git+https://github.com/miurahr/aqtinstall.git'

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: true

      - name: Setup QtIFW
        shell: pwsh
        run: |
          $url = "https://download.qt.io/online/qtsdkrepository/windows_x86/ifw/tools_ifw_411/qt.tools.ifw.411/4.11.0-0-202603231357ifw-win-x64.7z"
          curl.exe -L $url -o qtifw.7z
          7z x qtifw.7z -oqtifw
          $qtifwPath = (Get-ChildItem -Path qtifw -Filter binarycreator.exe -Recurse | Select-Object -First 1).DirectoryName
          if (-not $qtifwPath) { throw "Could not find binarycreator.exe in qtifw package" }
          echo "QTIFW_PATH=$qtifwPath" >> $env:GITHUB_ENV
          Remove-Item qtifw.7z

      - name: Download FluidSynth
        uses: actions/download-artifact@v8
        with:
          name: fluidsynth-multi-reverb-win64
          path: fluidsynth

      - name: Build
        shell: pwsh
        run: |
          $fs = "${{ github.workspace }}/fluidsynth"
          xmake config --yes --arch=x64 --toolchain=msvc --mode=release --fluidsynth_dir="$fs"
          xmake build --yes --jobs=2

      - name: Copy Files
        shell: pwsh
        run: |
          $data = "./packaging/org.midieditor.midieditor/data"
          mkdir $data
          cp ./bin/MidiEditor.exe $data/
          windeployqt --release --no-translations --no-opengl-sw --no-system-d3d-compiler --no-compiler-runtime --skip-plugin-types qmltooling,sqldrivers,positioning,sensors,serialport,texttospeech,webengine --plugindir $data/plugins $data/MidiEditor.exe
          Remove-Item -Path ./fluidsynth/bin/vcruntime*.dll -ErrorAction SilentlyContinue
          Remove-Item -Path ./fluidsynth/bin/msvcp*.dll -ErrorAction SilentlyContinue
          Remove-Item -Path ./fluidsynth/bin/concrt*.dll -ErrorAction SilentlyContinue
          cp ./fluidsynth/bin/*.dll $data/
          mkdir ./packaging/org.midieditor.manual/data/
          cp -Recurse -Path ./manual/ -Destination ./packaging/org.midieditor.manual/data/

      - name: Packaging
        shell: pwsh
        run: |
          $binaryCreator = "$env:QTIFW_PATH\binarycreator.exe"
          & $binaryCreator --offline-only -c .\scripts\packaging\windows\config.xml -p .\packaging Install.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: midieditor-xmake-${{ matrix.qt_arch }}
          path: Install.exe
